<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover: needed for real env(safe-area-inset-*) values and
         for the map to render under the status bar / Dynamic Island. In
         installed mode iOS then MISREPORTS every dynamic viewport height
         (innerHeight/100dvh/100svh say screen-minus-inset; the real window is
         full-screen — WebKit bug #254868), so style.css forces 100vh on
         html/body/#app there. Full write-up:
         dev-material/ios-safe-area-viewport.md. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1c1917" />
    <title>PocketZot (DWEM)</title>
    <meta
      name="description"
      content="PocketZot is an unofficial, mobile-first WebTiles client for Dungeon Crawl Stone Soup (DCSS). Play DCSS on your phone in portrait mode with an ASCII-first interface, carefully designed touch controls, and PWA install."
    />
    <!-- Canonical / social URLs point at the project's official deployment.
         Forks deployed elsewhere should update the domain below. -->
    <link rel="canonical" href="https://refracta.github.io/pocketzot-dwem/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PocketZot (DWEM)" />
    <meta property="og:title" content="PocketZot (DWEM)" />
    <meta
      property="og:description"
      content="An unofficial, mobile-first DCSS WebTiles client. ASCII-first, touch controls, installs as a PWA."
    />
    <meta property="og:url" content="https://refracta.github.io/pocketzot-dwem/" />
    <meta property="og:image" content="https://refracta.github.io/pocketzot-dwem/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="PocketZot (DWEM)" />
    <meta
      name="twitter:description"
      content="An unofficial, mobile-first DCSS WebTiles client. ASCII-first, touch controls, installs as a PWA."
    />
    <meta name="twitter:image" content="https://refracta.github.io/pocketzot-dwem/icon-512.png" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="icon" type="image/png" href="%BASE_URL%icon-192.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%icon-192.png" />
  </head>
  <body>
    <div id="app"></div>
    <noscript>
      <main style="max-width:680px;margin:0 auto;padding:3rem 1.5rem;font-family:system-ui,-apple-system,sans-serif;color:#e7e2da;background:#0a0908;line-height:1.6">
        <h1>PocketZot (DWEM)</h1>
        <p>
          PocketZot is an unofficial, mobile-first WebTiles client for
          <a href="https://crawl.develz.org" style="color:#d08a3e">Dungeon Crawl Stone Soup (DCSS)</a>.
          It connects to standard DCSS WebTiles servers with an ASCII-first,
          touch-friendly interface and installs as a Progressive Web App.
          JavaScript is required to play.
        </p>
        <p><a href="about.html" style="color:#d08a3e">Read more about PocketZot →</a></p>
      </main>
    </noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
